<!doctype html>
<!-- ================================================================
     Janelas de Miranda — WebAR
     Base: código original da Diana (que funcionava)
     Alterações: apenas visuais — paleta, balão, título, botões 2D
     Estrutura JS e A-Frame: 100% idêntica ao original
     ================================================================ -->
<html lang="pt">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Janelas de Miranda — WebAR</title>

    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>

    <style>
      :root {
        --espresso: #542916;
        --eau-trouble: #b79858;
        --terre-cuite: #a13a1e;
        --nuage: #fefaf0;
        --miel: #f1c166;
        --burel: #0a0806;
      }

      body {
        margin: 0;
        overflow: hidden;
        background: var(--burel);
        font-family: sans-serif;
      }

      /* ── Overlay de instrução ───────────────────────────────── */
      #overlay-instrucao {
        position: fixed;
        top: 20px;
        left: 50%;
        transform: translateX(-50%);
        z-index: 999;
        background: rgba(10, 8, 6, 0.9);
        color: var(--nuage);
        padding: 8px 20px;
        border-radius: 20px;
        font-size: 11px;
        letter-spacing: 0.06em;
        border: 1px solid var(--terre-cuite);
        white-space: nowrap;
      }

      /* ── Botões 2D — base do ecrã ───────────────────────────── */
      /* Estilo do mockup: grandes, arredondados, fundo cinzento/bege */
      .interface-botoes {
        position: fixed;
        bottom: 28px;
        left: 50%;
        transform: translateX(-50%);
        display: none;
        flex-direction: row;
        gap: 16px;
        z-index: 1000;
      }

      .btn-link {
        padding: 14px 28px;
        border-radius: 40px;
        /* Fundo cinzento acastanhado como no mockup */
        background: rgba(160, 148, 130, 0.82);
        color: var(--nuage);
        text-decoration: none;
        font-size: 11px;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 0.12em;
        border: none;
        white-space: nowrap;
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
      }
    </style>
  </head>
  <body>
    <div id="overlay-instrucao">Aponte para o íman dos Pauliteiros</div>

    <div id="botoes-ar" class="interface-botoes">
      <a
        href="https://www.youtube.com/watch?v=GrUTkjbNbdM"
        target="_blank"
        class="btn-link"
        >Ver Vídeo Completo</a
      >
      <a href="https://pauliteiros.com/" target="_blank" class="btn-link"
        >Saber Mais</a
      >
    </div>

    <!-- ============================================================
         CENA A-FRAME — estrutura 100% do original da Diana
         Apenas os valores de cor, tamanho e posição foram ajustados
         ============================================================ -->
    <a-scene
      mindar-image="imageTargetSrc: ./pauliteiros.mind; autoStart: true; uiScanning: no;"
      color-space="sRGB"
      renderer="colorManagement: true, physicallyCorrectLights"
      vr-mode-ui="enabled: false"
      device-orientation-permission-ui="enabled: false"
      raycaster="objects: .clickable"
      cursor="fuse: false; rayOrigin: mouse;"
    >
      <a-assets>
        <!-- Nome confirmado pela Diana -->
        <video
          id="vid"
          src="./Pauliteirosclip.mp4"
          playsinline
          webkit-playsinline
          muted
          crossorigin="anonymous"
          loop
          preload="auto"
        ></video>
        <!-- Imagem na raiz do projecto (confirmado pela Diana) -->
        <img id="fundo-desenho" src="./3-1.jpg" crossorigin="anonymous" />
      </a-assets>

      <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

      <a-entity mindar-image-target="targetIndex: 0">
        <!-- Fundo escuro geral — igual ao original -->
        <a-plane
          position="0 0.1 -0.05"
          width="1.8"
          height="1.8"
          material="color: #0a0806; opacity: 1; transparent: false;"
        >
        </a-plane>

        <!-- ── VÍDEO — igual ao original, mesmo tamanho ────────── -->
        <a-video
          src="#vid"
          position="0 0.42 0"
          width="1.4"
          height="1.0"
        ></a-video>

        <!-- ── TÍTULO ORNAMENTADO ──────────────────────────────────
             Linha superior com losango central + título + linha inferior
             Igual ao mockup: setas/chevrons nas pontas, losango ao centro
             ──────────────────────────────────────────────────────── -->

        <!-- Linha esquerda superior -->
        <a-plane
          position="-0.34 -0.09 0.05"
          width="0.34"
          height="0.004"
          color="#a13a1e"
          opacity="1"
        ></a-plane>
        <!-- Seta/ponteiro esquerdo -->
        <a-plane
          position="-0.67 -0.09 0.05"
          width="0.04"
          height="0.04"
          color="#a13a1e"
          opacity="1"
          rotation="0 0 45"
        ></a-plane>
        <!-- Círculo central superior -->
        <a-circle
          position="0 -0.09 0.05"
          radius="0.025"
          color="#a13a1e"
          opacity="1"
        ></a-circle>
        <!-- Linha direita superior -->
        <a-plane
          position="0.34 -0.09 0.05"
          width="0.34"
          height="0.004"
          color="#a13a1e"
          opacity="1"
        ></a-plane>
        <!-- Seta/ponteiro direito -->
        <a-plane
          position="0.67 -0.09 0.05"
          width="0.04"
          height="0.04"
          color="#a13a1e"
          opacity="1"
          rotation="0 0 45"
        ></a-plane>

        <!-- TÍTULO -->
        <a-text
          value="LHAÇO L' CASTILHO"
          position="0 -0.155 0.05"
          align="center"
          color="#a13a1e"
          width="1.7"
          font="https://cdn.aframe.io/fonts/Exo2Bold.fnt"
          wrap-count="20"
          letter-spacing="2"
        >
        </a-text>

        <!-- Linha esquerda inferior -->
        <a-plane
          position="-0.34 -0.225 0.05"
          width="0.34"
          height="0.004"
          color="#a13a1e"
          opacity="1"
        ></a-plane>
        <!-- Seta/ponteiro esquerdo inferior -->
        <a-plane
          position="-0.67 -0.225 0.05"
          width="0.04"
          height="0.04"
          color="#a13a1e"
          opacity="1"
          rotation="0 0 45"
        ></a-plane>
        <!-- Círculo central inferior -->
        <a-circle
          position="0 -0.225 0.05"
          radius="0.025"
          color="#a13a1e"
          opacity="1"
        ></a-circle>
        <!-- Linha direita inferior -->
        <a-plane
          position="0.34 -0.225 0.05"
          width="0.34"
          height="0.004"
          color="#a13a1e"
          opacity="1"
        ></a-plane>
        <!-- Seta/ponteiro direito inferior -->
        <a-plane
          position="0.67 -0.225 0.05"
          width="0.04"
          height="0.04"
          color="#a13a1e"
          opacity="1"
          rotation="0 0 45"
        ></a-plane>

        <!-- ── BALÃO DE TEXTO ───────────────────────────────────────
             Fundo: cinzento/bege acastanhado como no mockup
             Ilustração 3-1.jpg subtil no canto direito
             Cantos arredondados simulados com escala
             ──────────────────────────────────────────────────────── -->
        <a-entity id="balao-informativo" position="0 -0.52 0.1">
          <!-- Fundo do balão — cinzento acastanhado do mockup -->
          <a-plane
            width="1.35"
            height="0.72"
            material="color: #a09482; opacity: 0.88; transparent: true;"
            geometry="primitive: plane;"
            scale="1 1 1"
          >
          </a-plane>

          <!-- Ilustração 3-1.jpg — canto direito, muito subtil -->
          <a-plane
            position="0.32 -0.06 0.01"
            width="0.55"
            height="0.52"
            material="src: #fundo-desenho; transparent: true; opacity: 0.18; color: #ffffff;"
          >
          </a-plane>

          <!-- Texto do slide — branco sobre o fundo cinzento -->
          <a-text
            id="texto-scroll"
            value="Os Pauliteiros de Miranda sao um grupo de danca original das Terras de Miranda do Douro com antecedencia na denominada danca de espadas."
            position="-0.58 0.18 0.02"
            align="left"
            color="#ffffff"
            width="1.1"
            wrap-count="22"
            line-height="55"
            baseline="top"
          >
          </a-text>

          <!-- Botão Seguinte — canto inferior direito do balão -->
          <a-entity
            id="btn-seguinte"
            class="clickable"
            position="0.38 -0.27 0.02"
          >
            <a-text
              value="Seguinte ›"
              align="center"
              color="#e8dcc8"
              width="0.55"
              font="https://cdn.aframe.io/fonts/Exo2Bold.fnt"
            >
            </a-text>
          </a-entity>
        </a-entity>
      </a-entity>
    </a-scene>

    <!-- ============================================================
         JAVASCRIPT — 100% idêntico ao original da Diana
         ============================================================ -->
    <script>
      const video = document.getElementById("vid");
      const botoesAR = document.getElementById("botoes-ar");
      const textoScroll = document.getElementById("texto-scroll");
      const btnSeguinte = document.getElementById("btn-seguinte");

      const info = [
        "Os Pauliteiros de Miranda sao um grupo de danca original das Terras de Miranda do Douro com antecedencia na denominada danca de espadas.",
        "Sao grupos de 8 homens que dancam ao som da gaita-de-fole, bombo e caixa. O ritmo e unico na Peninsula Iberica.",
        "O Castelo e um dos lhacos mais acrobaticos. Os dancadores formam uma torre humana, simbolo de forca e uniao.",
        "Reconhecidos como Património Cultural Imaterial, representam a resistencia da lingua e cultura mirandesa.",
        "Visita Miranda do Douro e descobre esta tradicao viva nos festivais e festas locais ao longo do ano.",
      ];
      let i = 0;

      btnSeguinte.addEventListener("click", () => {
        i = (i + 1) % info.length;
        textoScroll.setAttribute("value", info[i]);
      });

      document
        .querySelector("[mindar-image-target]")
        .addEventListener("targetFound", () => {
          video.play();
          botoesAR.style.display = "flex";
        });

      document
        .querySelector("[mindar-image-target]")
        .addEventListener("targetLost", () => {
          video.pause();
          botoesAR.style.display = "none";
        });
    </script>
  </body>
</html>
