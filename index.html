<!doctype html>
<html lang="pt">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Janelas de Miranda — WebAR</title>

    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>

    <style>
      :root {
        /* PALETA DE DESIGNER "JANELAS DE MIRANDA" */
        --espresso: #542916;      /* Castanho Profundo (Texto) */
        --eau-trouble: #b79858;  /* Bege Mostarda (Acentos) */
        --terre-cuite: #a13a1e;  /* Terracota Avermelhado (Título) */
        --nuage-de-lait: #fefaf0;   /* Creme Amanteigado (Início Degradé) */
        --miel-dore: #f1c166;       /* Ocre Dourado (Fim Degradé) */
        
        --burel-escuro: #0a0806;  /* Fundo da cena (Sólido) */
      }

      body { margin: 0; overflow: hidden; background: var(--burel-escuro); font-family: 'Jost', sans-serif; }

      /* Interface 2D na parte inferior do ecrã */
      .interface-botoes {
        position: fixed;
        bottom: 25px;
        left: 50%;
        transform: translateX(-50%);
        display: none; /* Só aparece quando deteta o íman */
        flex-direction: row;
        gap: 12px;
        z-index: 1000;
      }

      .btn-link {
        padding: 9px 18px;
        border-radius: 20px;
        background: var(--espresso);
        color: var(--nuage-de-lait);
        text-decoration: none;
        font-size: 11px;
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 1px;
        border: 1px solid var(--eau-trouble);
        white-space: nowrap;
      }

      #overlay-instrucao {
        position: fixed;
        top: 20px;
        left: 50%;
        transform: translateX(-50%);
        z-index: 999;
        background: rgba(10, 8, 6, 0.9);
        color: var(--nuage-de-lait);
        padding: 8px 20px;
        border-radius: 20px;
        font-size: 11px;
        border: 1px solid var(--terre-cuite);
      }
    </style>
  </head>
  <body>
    
    <div id="overlay-instrucao">Aponte para o íman dos Pauliteiros</div>

    <div id="botoes-ar" class="interface-botoes">
      <a href="https://www.youtube.com/watch?v=GrUTkjbNbdM" target="_blank" class="btn-link">Ver Vídeo</a>
      <a href="https://pauliteiros.com/" target="_blank" class="btn-link">Saber Mais</a>
    </div>

    <a
