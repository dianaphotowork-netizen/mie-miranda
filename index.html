<!doctype html>
<html lang="pt">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Janelas de Miranda — WebAR</title>

    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>

    <style>
      :root {
        --burel-escuro: #1a1410;
        --castanho-claro: #a1887f; /* O castanho clarinho que pediste */
        --terracota: #c4622d;
        --la-crua: #e8dcc8;
      }

      body {
        margin: 0;
        overflow: hidden;
        background: var(--burel-escuro);
        font-family: "Jost", sans-serif;
      }

      /* Botões 2D na parte inferior do ecrã */
      .interface-botoes {
        position: fixed;
        bottom: 30px;
        left: 50%;
        transform: translateX(-50%);
        display: none; /* Só aparece quando deteta o íman */
        flex-direction: column;
        gap: 12px;
        z-index: 1000;
        width: 80%;
        max-width: 300px;
      }

      .btn-link {
        padding: 14px;
        border-radius: 12px;
        background: var(--castanho-claro);
        color: #ffffff;
        text-decoration: none;
        font-size: 13px;
        font-weight: 600;
        text-align: center;
        text-transform: uppercase;
        letter-spacing: 1px;
        box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
        border: none;
      }

      #overlay-instrucao {
        position: fixed;
        top: 20px;
        left: 50%;
        transform: translateX(-50%);
        z-index: 999;
        background: rgba(26, 20, 16, 0.8);
        color: var(--la-crua);
        padding: 8px 20px;
        border-radius: 20px;
        font-size: 11px;
        border: 1px solid var(--terracota);
      }
    </style>
  </head>
  <body>
    <div id="overlay-instrucao">Aponte para o íman dos Pauliteiros</div>

    <div id="botoes-ar" class="interface-botoes">
      <a
        href="https://www.youtube.com/watch?v=GrUTkjbNbdM"
        target="_blank"
        class="btn-link"
        >Ver Vídeo Completo</a
      >
      <a href="https://pauliteiros.com/" target="_blank" class="btn-link"
        >Saber Mais</a
      >
    </div>

    <a-scene
      mindar-image="imageTargetSrc: ./pauliteiros.mind; autoStart: true; uiScanning: no;"
      color-space="sRGB"
      renderer="colorManagement: true, physicallyCorrectLights"
      vr-mode-ui="enabled: false"
      device-orientation-permission-ui="enabled: false"
      raycaster="objects: .clickable"
      cursor="fuse: false; rayOrigin: mouse;"
    >
      <a-assets>
        <video
          id="vid"
          src="./Pauliteirosclip.mp4"
          playsinline
          webkit-playsinline
          muted
          crossorigin="anonymous"
          loop
          preload="auto"
        ></video>
      </a-assets>

      <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

      <a-entity mindar-image-target="targetIndex: 0">
        <a-plane
          position="0 0.15 -0.02"
          width="1.1"
          height="0.9"
          material="color: #1A1410; opacity: 0.9; transparent: false;"
        >
        </a-plane>

        <a-video
          src="#vid"
          position="0 0.15 0"
          width="1"
          height="0.75"
        ></a-video>

        <a-text
          value="LHACCO L' CASTILHO"
          position="0 -0.32 0.02"
          align="center"
          color="#2C2218"
          width="1.2"
          font="https://cdn.aframe.io/fonts/Exo2Bold.fnt"
        >
        </a-text>

        <a-entity position="0.85 0.15 0.05" rotation="0 -10 0">
          <a-entity
            geometry="primitive: plane; width: 0.7; height: 0.6"
            material="color: #FFFFFF; opacity: 0.4; transparent: true; roughness: 0;"
          >
          </a-entity>

          <a-text
            id="texto-scroll"
            value="Lhacco e o nome para a melodia e coreografia."
            position="0 0.05 0.01"
            align="center"
            color="#1A1410"
            width="0.6"
            wrap-count="15"
          >
          </a-text>

          <a-entity id="btn-seguinte" class="clickable" position="0 -0.2 0.02">
            <a-plane width="0.3" height="0.1" color="#c4622d"></a-plane>
            <a-text
              value="SEGUINTE"
              align="center"
              color="#FFF"
              width="0.5"
            ></a-text>
          </a-entity>
        </a-entity>
      </a-entity>
    </a-scene>

    <script>
      const video = document.getElementById("vid");
      const botoesAR = document.getElementById("botoes-ar");
      const textoScroll = document.getElementById("texto-scroll");
      const btnSeguinte = document.getElementById("btn-seguinte");

      const info = [
        "Lhacco e o nome para a melodia e coreografia.",
        "O bailarino chama-se dancador e nao pauliteiro.",
        "A danca divide-se em: Entrada, Anunciar, Lhacco e Bicha.",
        "Os Pauliteiros sao uma tradicao viva de Miranda do Douro.",
      ];
      let i = 0;

      // Lógica do botão Seguinte
      btnSeguinte.addEventListener("click", () => {
        i = (i + 1) % info.length;
        textoScroll.setAttribute("value", info[i]);
      });

      document
        .querySelector("[mindar-image-target]")
        .addEventListener("targetFound", () => {
          video.play();
          botoesAR.style.display = "flex";
        });

      document
        .querySelector("[mindar-image-target]")
        .addEventListener("targetLost", () => {
          video.pause();
          botoesAR.style.display = "none";
        });
    </script>
  </body>
</html>
