<!doctype html>
<html lang="pt">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Janelas de Miranda — Tradição Artesanal Viva</title>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700;1,400&family=Jost:wght@300;400;500&display=swap"
      rel="stylesheet"
    />

    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>

    <style>
      :root {
        --burel-fundo: #1a1410;
        --terracota: #c4622d;
        --terracota-claro: #d97c4a;
        --la-crua: #e8dcc8;
        --la-suave: #c9bba8;
        --mdf-claro: #f2ebe0;
        --overlay-fundo: rgba(26, 20, 16, 0.9);
        --fonte-display: "Cormorant Garamond", Georgia, serif;
        --fonte-corpo: "Jost", Helvetica, sans-serif;
      }

      body {
        margin: 0;
        overflow: hidden;
        background: var(--burel-fundo);
        font-family: var(--fonte-corpo);
      }

      #marca {
        position: fixed;
        top: 22px;
        left: 20px;
        z-index: 999;
        display: flex;
        flex-direction: column;
        gap: 3px;
        filter: drop-shadow(0 2px 12px rgba(0, 0, 0, 0.7));
      }
      #marca .nome {
        font-family: var(--fonte-display);
        font-size: 22px;
        font-weight: 700;
        font-style: italic;
        color: var(--mdf-claro);
        line-height: 1;
      }
      #marca .subtitulo {
        font-family: var(--fonte-corpo);
        font-size: 9px;
        font-weight: 300;
        color: var(--terracota-claro);
        letter-spacing: 0.22em;
        text-transform: uppercase;
      }
      #marca::after {
        content: "";
        display: block;
        width: 28px;
        height: 1px;
        background: var(--terracota);
        margin-top: 5px;
      }

      #overlay {
        position: fixed;
        top: 22px;
        left: 50%;
        transform: translateX(-50%);
        z-index: 999;
        background: var(--overlay-fundo);
        color: var(--la-suave);
        padding: 10px 22px;
        border-radius: 40px;
        font-size: 12px;
        border: 1px solid rgba(196, 98, 45, 0.35);
        backdrop-filter: blur(14px);
        -webkit-backdrop-filter: blur(14px);
      }
      #overlay.ativo {
        background: rgba(196, 98, 45, 0.88);
        color: var(--mdf-claro);
      }

      #btn-audio {
        position: fixed;
        bottom: 32px;
        right: 22px;
        z-index: 999;
        width: 52px;
        height: 52px;
        border-radius: 50%;
        background: var(--overlay-fundo);
        border: 1px solid rgba(196, 98, 45, 0.4);
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        backdrop-filter: blur(14px);
      }
      #etiqueta-audio {
        position: fixed;
        bottom: 14px;
        right: 0;
        width: 96px;
        text-align: center;
        z-index: 999;
        font-size: 9px;
        color: rgba(232, 220, 200, 0.38);
        text-transform: uppercase;
      }

      #dica-scan {
        position: fixed;
        bottom: 32px;
        left: 50%;
        transform: translateX(-50%);
        z-index: 999;
        display: flex;
        align-items: center;
        gap: 10px;
        background: var(--overlay-fundo);
        border: 1px solid rgba(196, 98, 45, 0.25);
        border-radius: 40px;
        padding: 10px 20px;
        backdrop-filter: blur(14px);
      }
      #dica-scan.oculto {
        opacity: 0;
        pointer-events: none;
      }
      .pulso {
        width: 8px;
        height: 8px;
        border-radius: 50%;
        background: var(--terracota);
        animation: pulsar 1.8s infinite;
      }
      @keyframes pulsar {
        0%,
        100% {
          transform: scale(1);
          opacity: 1;
        }
        50% {
          transform: scale(1.7);
          opacity: 0.35;
        }
      }
    </style>
  </head>
  <body>
    <div id="marca">
      <span class="nome">Janelas de Miranda</span
      ><span class="subtitulo">Tradição Artesanal Viva</span>
    </div>
    <div id="overlay">Aponte o íman para a câmara</div>

    <button id="btn-audio">
      <svg
        id="icone-sem-som"
        viewBox="0 0 24 24"
        fill="none"
        stroke="var(--la-suave)"
        stroke-width="1.6"
        stroke-linecap="round"
        stroke-linejoin="round"
      >
        <path d="M11 5L6 9H3v6h3l5 4V5z" />
        <line x1="23" y1="9" x2="17" y2="15" />
        <line x1="17" y1="9" x2="23" y2="15" />
      </svg>
      <svg
        id="icone-com-som"
        viewBox="0 0 24 24"
        fill="none"
        stroke="var(--terracota-claro)"
        stroke-width="1.6"
        stroke-linecap="round"
        stroke-linejoin="round"
        style="display: none"
      >
        <path d="M11 5L6 9H3v6h3l5 4V5z" />
        <path d="M15.54 8.46a5 5 0 0 1 0 7.07" />
        <path d="M19.07 4.93a10 10 0 0 1 0 14.14" />
      </svg>
    </button>
    <div id="etiqueta-audio">Som</div>

    <div id="dica-scan">
      <div class="pulso"></div>
      <span class="texto-dica">A detetar íman…</span>
    </div>

    <a-scene
      mindar-image="imageTargetSrc: ./pauliteiros.mind; autoStart: true; uiScanning: no;"
      color-space="sRGB"
      renderer="colorManagement: true, physicallyCorrectLights"
      vr-mode-ui="enabled: false"
      device-orientation-permission-ui="enabled: false"
    >
      <a-assets>
        <video
          id="vid"
          src="./Pauliteirosclip.mp4"
          playsinline
          webkit-playsinline
          muted
          crossorigin="anonymous"
          loop
          preload="auto"
        ></video>
      </a-assets>

      <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

      <a-entity mindar-image-target="targetIndex: 0">
        <a-plane
          material="shader: standard; color: #ffffff; transparent: true; opacity: 0.15; roughness: 0.1; metalness: 0.5;"
          position="0 0.15 -0.01"
          width="1.1"
          height="0.9"
        >
        </a-plane>

        <a-video
          src="#vid"
          position="0 0.15 0.01"
          width="1"
          height="0.75"
        ></a-video>

        <a-text
          value="LHACCO L' CASTILHO"
          position="0 -0.32 0.02"
          align="center"
          color="#e8dcc8"
          width="1.2"
          font="https://cdn.aframe.io/fonts/Exo2Bold.fnt"
        >
        </a-text>

        <a-entity position="0.95 0.15 0.05" rotation="0 -10 0">
          <a-plane
            width="0.85"
            height="0.65"
            material="shader: standard; color: #1a1410; transparent: true; opacity: 0.85;"
            border="width: 0.01; color: #c4622d"
          >
          </a-plane>
          <a-text
            value="Os Pauliteiros dancam ao som da gaita-de-fole. Este lhaco simboliza a forca e a uniao da terra mirandesa."
            position="0 0 0.01"
            align="center"
            color="#c9bba8"
            width="0.75"
            wrap-count="18"
            line-height="50"
          >
          </a-text>
        </a-entity>

        <a-plane
          position="0 -0.25 0.02"
          width="0.6"
          height="0.005"
          color="#c4622d"
        ></a-plane>
      </a-entity>
    </a-scene>

    <script>
      const overlay = document.getElementById("overlay");
      const dicaScan = document.getElementById("dica-scan");
      const btnAudio = document.getElementById("btn-audio");
      const video = document.getElementById("vid");
      const iconeSemSom = document.getElementById("icone-sem-som");
      const iconeComSom = document.getElementById("icone-com-som");
      let audioAtivo = false;

      document
        .querySelector("[mindar-image-target]")
        .addEventListener("targetFound", () => {
          overlay.textContent = "▶ A reproduzir";
          overlay.classList.add("ativo");
          dicaScan.classList.add("oculto");
          video.play();
        });

      document
        .querySelector("[mindar-image-target]")
        .addEventListener("targetFound", () => {
          // Garantia de Play se o utilizador já tiver interagido com o som
          if (!audioAtivo) video.muted = true;
          video.play();
        });

      document
        .querySelector("[mindar-image-target]")
        .addEventListener("targetLost", () => {
          overlay.textContent = "Aponte o íman para a câmara";
          overlay.classList.remove("ativo");
          dicaScan.classList.remove("oculto");
          video.pause();
        });

      btnAudio.addEventListener("click", () => {
        audioAtivo = !audioAtivo;
        video.muted = !audioAtivo;
        iconeSemSom.style.display = audioAtivo ? "none" : "block";
        iconeComSom.style.display = audioAtivo ? "block" : "none";

        // Se o vídeo já estiver a correr, o unmute aplica-se na hora
        if (audioAtivo) {
          video.play();
        }
      });
    </script>
  </body>
</html>
