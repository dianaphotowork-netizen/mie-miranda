<!doctype html>
<html lang="pt">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Janelas de Miranda — WebAR</title>

    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>

    <style>
      :root {
        /* PALETA DE DESIGNER "JANELAS DE MIRANDA" */
        --espresso: #542916; /* Castanho Profundo (Texto) */
        --eau-trouble: #b79858; /* Bege Mostarda (Acentos) */
        --terre-cuite: #a13a1e; /* Terracota Avermelhado (Título) */
        --nuage-de-lait: #fefaf0; /* Creme Amanteigado (Início Degradé) */
        --miel-dore: #f1c166; /* Ocre Dourado (Fim Degradé) */

        --burel-escuro: #0a0806; /* Fundo da cena (Sólido) */
      }

      body {
        margin: 0;
        overflow: hidden;
        background: var(--burel-escuro);
        font-family: "Jost", sans-serif;
      }

      /* Interface 2D na parte inferior do ecrã */
      .interface-botoes {
        position: fixed;
        bottom: 25px;
        left: 50%;
        transform: translateX(-50%);
        display: none; /* Só aparece quando deteta o íman */
        flex-direction: row;
        gap: 12px;
        z-index: 1000;
      }

      .btn-link {
        padding: 9px 18px;
        border-radius: 20px;
        background: var(--espresso);
        color: var(--nuage-de-lait);
        text-decoration: none;
        font-size: 11px;
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 1px;
        border: 1px solid var(--eau-trouble);
        white-space: nowrap;
      }

      #overlay-instrucao {
        position: fixed;
        top: 20px;
        left: 50%;
        transform: translateX(-50%);
        z-index: 999;
        background: rgba(10, 8, 6, 0.9);
        color: var(--nuage-de-lait);
        padding: 8px 20px;
        border-radius: 20px;
        font-size: 11px;
        border: 1px solid var(--terre-cuite);
      }
    </style>
  </head>
  <body>
    <div id="overlay-instrucao">Aponte para o íman dos Pauliteiros</div>

    <div id="botoes-ar" class="interface-botoes">
      <a
        href="https://www.youtube.com/watch?v=GrUTkjbNbdM"
        target="_blank"
        class="btn-link"
        >Ver Vídeo</a
      >
      <a href="https://pauliteiros.com/" target="_blank" class="btn-link"
        >Saber Mais</a
      >
    </div>

    <a-scene
      mindar-image="imageTargetSrc: ./pauliteiros.mind; autoStart: true; uiScanning: no;"
      color-space="sRGB"
      renderer="colorManagement: true, physicallyCorrectLights"
      vr-mode-ui="enabled: false"
      device-orientation-permission-ui="enabled: false"
      raycaster="objects: .clickable"
      cursor="fuse: false; rayOrigin: mouse;"
    >
      <a-assets>
        <video
          id="vid"
          src="./Pauliteirosclip.mp4"
          playsinline
          webkit-playsinline
          muted
          crossorigin="anonymous"
          loop
          preload="auto"
        ></video>
        <img id="fundo-desenho" src="./assets/3-1.jpg" />
      </a-assets>

      <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

      <a-entity mindar-image-target="targetIndex: 0">
        <a-plane
          position="0 0.1 -0.05"
          width="1.8"
          height="1.6"
          material="color: #0a0806; opacity: 1; transparent: false;"
        >
        </a-plane>

        <a-video src="#vid" position="0 0.4 0" width="1.4" height="1"></a-video>

        <a-text
          value="❧  LHAÇO L' CASTILHO  ❧"
          position="0 -0.12 0.05"
          align="center"
          color="#a13a1e"
          width="1.6"
          font="https://cdn.aframe.io/fonts/Exo2Bold.fnt"
        >
        </a-text>
        <a-text
          value="——— ◆ ———"
          position="0 -0.18 0.05"
          align="center"
          color="#542916"
          width="0.8"
        >
        </a-text>

        <a-entity id="balao-informativo" position="0 -0.45 0.1">
          <a-plane
            width="1.2"
            height="0.6"
            material="src: #fundo-desenho; transparent: true; opacity: 0.95; color: #fdf5e6;"
            border="width: 0.005; color: #a13a1e"
          >
          </a-plane>

          <a-text
            id="texto-scroll"
            value="Os Pauliteiros de Miranda sao um grupo de danca original das Terras de Miranda do Douro com antecedencia na denominada 'danca de espadas'."
            position="0 0.02 0.01"
            align="center"
            color="#542916"
            width="1.1"
            wrap-count="22"
            line-height="55"
          >
          </a-text>

          <a-entity
            id="btn-seguinte"
            class="clickable"
            position="0.45 -0.22 0.02"
          >
            <a-plane
              width="0.32"
              height="0.12"
              material="shader: standard; color: #fefaf0; transparent: true; opacity: 0.9;"
              border="width: 0.005; color: #b79858"
            >
            </a-plane>
            <a-text
              value="Seguinte ❧"
              align="center"
              color="#542916"
              width="0.5"
              font="https://cdn.aframe.io/fonts/Exo2Bold.fnt"
            ></a-text>
          </a-entity>
        </a-entity>
      </a-entity>
    </a-scene>

    <script>
      const video = document.getElementById("vid");
      const botoesAR = document.getElementById("botoes-ar");
      const textoScroll = document.getElementById("texto-scroll");
      const btnSeguinte = document.getElementById("btn-seguinte");

      const info = [
        "Os Pauliteiros de Miranda sao um grupo de danca original das Terras de Miranda do Douro.",
        "Dividem-se em 4 partes: Entrada, Anunciar o Lhaco, Lhaco e Bicha.",
        "A danca tem elementos guerreiros, religiosos e rituais rurais ancestral.",
        "O bailarino e designado como dancador e nao pauliteiro.",
      ];
      let i = 0;

      btnSeguinte.addEventListener("click", () => {
        i = (i + 1) % info.length;
        textoScroll.setAttribute("value", info[i]);
      });

      document
        .querySelector("[mindar-image-target]")
        .addEventListener("targetFound", () => {
          video.play();
          botoesAR.style.display = "flex";
        });

      document
        .querySelector("[mindar-image-target]")
        .addEventListener("targetLost", () => {
          video.pause();
          botoesAR.style.display = "none";
        });
    </script>
  </body>
</html>
