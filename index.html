<!doctype html>
<!-- ================================================================
     Janelas de Miranda — WebAR
     Base: index.html que funcionava (enviado pela Diana)
     Adições: 5 slides, botão Seguinte, imagem 3-1.jpg no balão
     Correcções: nome do vídeo → Pauliteirosclip.mp4
                 imagem → ./3-1.jpg (raiz do projeto)
     ================================================================ -->
<html lang="pt">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Janelas de Miranda — WebAR</title>

    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>

    <style>
      :root {
        --espresso: #542916;
        --eau-trouble: #b79858;
        --terre-cuite: #a13a1e;
        --nuage: #fefaf0;
        --miel: #f1c166;
      }

      body {
        margin: 0;
        overflow: hidden;
        background: #0a0806;
        font-family: "Jost", sans-serif;
      }

      /* ── Overlay instrução (estado de espera) ───────────────── */
      #overlay-instrucao {
        position: fixed;
        top: 20px;
        left: 50%;
        transform: translateX(-50%);
        z-index: 999;
        background: rgba(10, 8, 6, 0.9);
        color: var(--nuage);
        padding: 8px 20px;
        border-radius: 20px;
        font-size: 11px;
        border: 1px solid var(--terre-cuite);
        white-space: nowrap;
        transition: opacity 0.4s ease;
      }

      /* ── Botões 2D base do ecrã ─────────────────────────────── */
      /* Idênticos ao teu HTML original que funcionava */
      .interface-botoes {
        position: fixed;
        bottom: 25px;
        left: 50%;
        transform: translateX(-50%);
        display: none;
        flex-direction: row;
        gap: 12px;
        z-index: 1000;
      }

      .btn-link {
        padding: 9px 18px;
        border-radius: 20px;
        background: var(--espresso);
        color: var(--nuage);
        text-decoration: none;
        font-size: 11px;
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 1px;
        border: 1px solid var(--eau-trouble);
        white-space: nowrap;
      }
    </style>
  </head>
  <body>
    <div id="overlay-instrucao">Aponte para o íman dos Pauliteiros</div>

    <div id="botoes-ar" class="interface-botoes">
      <a
        href="https://www.youtube.com/watch?v=GrUTkjbNbdM"
        target="_blank"
        class="btn-link"
        >Ver Vídeo Completo</a
      >
      <a href="https://pauliteiros.com/" target="_blank" class="btn-link"
        >Saber Mais</a
      >
    </div>

    <!-- ============================================================
         CENA A-FRAME / MINDAR
         Estrutura idêntica ao teu index.html original
         ============================================================ -->
    <a-scene
      mindar-image="imageTargetSrc: ./pauliteiros.mind; autoStart: true; uiScanning: no;"
      color-space="sRGB"
      renderer="colorManagement: true, physicallyCorrectLights"
      vr-mode-ui="enabled: false"
      device-orientation-permission-ui="enabled: false"
    >
      <a-assets>
        <!-- NOME CORRECTO: Pauliteirosclip.mp4 (confirmado pela Diana) -->
        <video
          id="vid"
          src="./Pauliteirosclip.mp4"
          playsinline
          webkit-playsinline
          muted
          crossorigin="anonymous"
          loop
          preload="auto"
        ></video>

        <!-- CAMINHO CORRECTO: raiz do projeto, não em assets/ -->
        <img id="img-balao" src="./3-1.jpg" crossorigin="anonymous" />
      </a-assets>

      <!-- Câmara sem controlos manuais (MindAR posiciona automaticamente) -->
      <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

      <!-- ============================================================
           ENTITY DO TARGET
           ============================================================ -->
      <a-entity mindar-image-target="targetIndex: 0">
        <!-- ── VÍDEO ─────────────────────────────────────────────
             Grande, no topo. Moldura fina em eau-trouble.
             ──────────────────────────────────────────────────── -->
        <a-plane
          position="0 0.535 -0.001"
          width="0.93"
          height="0.55"
          color="#b79858"
          opacity="0.9"
        ></a-plane>

        <a-video
          src="#vid"
          position="0 0.535 0.002"
          width="0.90"
          height="0.525"
        ></a-video>

        <!-- ── TÍTULO ORNAMENTADO ─────────────────────────────────
             ——— ◇ ——— LHAÇO L' CASTILHO ——— ◇ ———
             ──────────────────────────────────────────────────── -->

        <!-- Ornamentos superiores -->
        <a-plane
          position="-0.215 0.222 0.002"
          width="0.215"
          height="0.003"
          color="#a13a1e"
          opacity="0.9"
        ></a-plane>
        <a-plane
          position="0 0.222 0.002"
          width="0.019"
          height="0.019"
          color="#a13a1e"
          opacity="1"
          rotation="0 0 45"
        ></a-plane>
        <a-plane
          position="0.215 0.222 0.002"
          width="0.215"
          height="0.003"
          color="#a13a1e"
          opacity="0.9"
        ></a-plane>

        <!-- Título -->
        <a-text
          id="titulo-ar"
          value="LHAÇO L' CASTILHO"
          position="0 0.192 0.003"
          align="center"
          color="#a13a1e"
          width="1.05"
          font="https://cdn.aframe.io/fonts/Exo2Bold.fnt"
          wrap-count="20"
          letter-spacing="3"
        ></a-text>

        <!-- Ornamentos inferiores -->
        <a-plane
          position="-0.215 0.162 0.002"
          width="0.215"
          height="0.003"
          color="#a13a1e"
          opacity="0.9"
        ></a-plane>
        <a-plane
          position="0 0.162 0.002"
          width="0.019"
          height="0.019"
          color="#a13a1e"
          opacity="1"
          rotation="0 0 45"
        ></a-plane>
        <a-plane
          position="0.215 0.162 0.002"
          width="0.215"
          height="0.003"
          color="#a13a1e"
          opacity="0.9"
        ></a-plane>

        <!-- ── BALÃO DE TEXTO (5 slides) ───────────────────────────
             Camadas:
             1. Borda eau-trouble
             2. Fundo creme #fefaf0
             3. Ilustração 3-1.jpg (opacidade baixa, canto direito)
             4. Véu de ocre na base (simula gradiente)
             5. Texto do slide
             6. Contador + botão Seguinte
             ──────────────────────────────────────────────────── -->

        <!-- 1. Borda -->
        <a-plane
          position="0 -0.235 0.001"
          width="0.905"
          height="0.640"
          color="#b79858"
          opacity="0.40"
        ></a-plane>

        <!-- 2. Fundo creme -->
        <a-plane
          position="0 -0.235 0.002"
          width="0.880"
          height="0.620"
          color="#fefaf0"
          opacity="0.96"
        ></a-plane>

        <!-- 3. Ilustração 3-1.jpg -->
        <a-plane
          position="0.19 -0.295 0.003"
          width="0.44"
          height="0.40"
          src="#img-balao"
          opacity="0.13"
          material="shader: flat; transparent: true;"
        ></a-plane>

        <!-- 4. Véu de ocre na base -->
        <a-plane
          position="0 -0.455 0.004"
          width="0.880"
          height="0.150"
          color="#f1c166"
          opacity="0.30"
        ></a-plane>

        <!-- 5. Texto do slide -->
        <a-text
          id="texto-slide"
          value="Os Pauliteiros de Miranda são um grupo de dança original das Terras de Miranda do Douro com antecedência na denominada dança de espadas."
          position="-0.375 -0.108 0.006"
          align="left"
          color="#542916"
          width="0.78"
          wrap-count="28"
          font="https://cdn.aframe.io/fonts/Exo2Light.fnt"
          line-height="54"
          baseline="top"
        ></a-text>

        <!-- 6a. Contador de slides -->
        <a-text
          id="contador-slides"
          value="1 / 5"
          position="-0.375 -0.506 0.006"
          align="left"
          color="#b79858"
          width="0.22"
          font="https://cdn.aframe.io/fonts/Exo2Light.fnt"
          wrap-count="6"
          opacity="0.80"
        ></a-text>

        <!-- 6b. Botão Seguinte — área de toque invisível (maior para mobile) -->
        <a-plane
          id="btn-seguinte-area"
          position="0.295 -0.506 0.006"
          width="0.27"
          height="0.07"
          color="#ffffff"
          opacity="0.001"
        ></a-plane>

        <!-- 6c. Botão Seguinte — texto visível -->
        <a-text
          id="btn-seguinte"
          value="Seguinte ›"
          position="0.295 -0.506 0.007"
          align="center"
          color="#b79858"
          width="0.38"
          font="https://cdn.aframe.io/fonts/Exo2Bold.fnt"
          wrap-count="12"
        ></a-text>
      </a-entity>
    </a-scene>

    <!-- ============================================================
         JAVASCRIPT
         Mesma estrutura do teu index.html original:
         · targetFound / targetLost directamente no elemento
         · Sem wrappers de cena que quebram o MindAR
         ============================================================ -->
    <script>
      // ── Conteúdo dos 5 slides ─────────────────────────────────
      const slides = [
        "Os Pauliteiros de Miranda são um grupo de dança original das Terras de Miranda do Douro com antecedência na denominada dança de espadas.",
        "São grupos de 8 homens que dançam ao som da gaita-de-fole, bombo e caixa. A gaita transmontana, única na Península Ibérica, marca o ritmo da dança.",
        "O Castelo é um dos lhaços mais acrobáticos. Os dançarinos formam uma torre humana, símbolo de força, equilíbrio e união da comunidade mirandesa.",
        "Reconhecidos como Património Cultural Imaterial, os Pauliteiros representam a resistência da língua e cultura mirandesa, transmitida de geração em geração.",
        "Visita Miranda do Douro e descobre esta tradição viva. Os Pauliteiros atuam em festas locais, feiras e eventos culturais ao longo do ano.",
      ];

      let slideAtual = 0;

      // ── Referências HTML ──────────────────────────────────────
      const overlayInstrucao = document.getElementById("overlay-instrucao");
      const botoesAr = document.getElementById("botoes-ar");

      // ── Referências A-Frame ───────────────────────────────────
      const targetEntity = document.querySelector("[mindar-image-target]");
      const video = document.getElementById("vid");
      const textoSlide = document.getElementById("texto-slide");
      const contadorSlides = document.getElementById("contador-slides");
      const btnArea = document.getElementById("btn-seguinte-area");
      const btnTexto = document.getElementById("btn-seguinte");

      // ── Atualiza o balão com o slide actual ───────────────────
      function atualizarSlide() {
        textoSlide.setAttribute("value", slides[slideAtual]);
        contadorSlides.setAttribute(
          "value",
          slideAtual + 1 + " / " + slides.length,
        );
      }

      // Inicializa com o slide 1
      atualizarSlide();

      // ── Clique no botão Seguinte ──────────────────────────────
      // Registado nos dois elementos para maximizar área de toque
      function avancarSlide(evt) {
        if (evt) evt.stopPropagation();
        slideAtual = (slideAtual + 1) % slides.length;
        atualizarSlide();
      }

      btnArea.addEventListener("click", avancarSlide);
      btnTexto.addEventListener("click", avancarSlide);

      // ── Clique no fundo → reset ao slide 1 ───────────────────
      document
        .querySelector("a-scene")
        .addEventListener("click", function (evt) {
          if (evt.target !== btnArea && evt.target !== btnTexto) {
            slideAtual = 0;
            atualizarSlide();
          }
        });

      // ── TARGET DETETADO ───────────────────────────────────────
      targetEntity.addEventListener("targetFound", () => {
        overlayInstrucao.style.opacity = "0";
        overlayInstrucao.style.pointerEvents = "none";
        botoesAr.style.display = "flex";
        video.play().catch((e) => console.log("Autoplay bloqueado:", e));
        atualizarSlide();
      });

      // ── TARGET PERDIDO ────────────────────────────────────────
      targetEntity.addEventListener("targetLost", () => {
        overlayInstrucao.style.opacity = "1";
        overlayInstrucao.style.pointerEvents = "auto";
        botoesAr.style.display = "none";
        video.pause();
      });

      console.log("Janelas de Miranda WebAR — pronto ✓");
    </script>
  </body>
</html>
