<!doctype html>
<html lang="pt">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Janelas de Miranda — Tradição Artesanal Viva</title>

    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>

    <style>
      :root {
        --burel-fundo: #1a1410;
        --terracota: #c4622d;
        --la-crua: #e8dcc8;
        --castanho-escuro: #2c2218;
        --overlay-fundo: rgba(26, 20, 16, 0.9);
      }

      body {
        margin: 0;
        overflow: hidden;
        background: var(--burel-fundo);
        font-family: sans-serif;
      }

      /* Interface 2D do Telefone */
      #marca {
        position: fixed;
        top: 20px;
        left: 20px;
        z-index: 999;
        color: var(--la-crua);
      }
      #marca .nome {
        font-size: 20px;
        font-weight: bold;
        font-style: italic;
      }

      #overlay {
        position: fixed;
        top: 20px;
        left: 50%;
        transform: translateX(-50%);
        z-index: 999;
        background: var(--overlay-fundo);
        color: var(--la-crua);
        padding: 10px 20px;
        border-radius: 40px;
        font-size: 12px;
        border: 1px solid var(--terracota);
        backdrop-filter: blur(10px);
      }

      .btn-link {
        position: fixed;
        bottom: 100px;
        left: 50%;
        transform: translateX(-50%);
        z-index: 1000;
        padding: 12px 24px;
        border-radius: 30px;
        background: var(--terracota);
        color: white;
        text-decoration: none;
        font-size: 14px;
        font-weight: bold;
        display: none;
        box-shadow: 0 4px 15px rgba(0, 0, 0, 0.4);
      }
      #btn-site {
        bottom: 40px;
        background: #5d4037;
      }
    </style>
  </head>
  <body>
    <div id="marca"><span class="nome">Janelas de Miranda</span></div>
    <div id="overlay">Aponte para o íman</div>

    <a
      href="https://www.youtube.com/watch?v=GrUTkjbNbdM"
      target="_blank"
      id="btn-video"
      class="btn-link"
      >Ver vídeo completo</a
    >
    <a
      href="https://pauliteiros.com/"
      target="_blank"
      id="btn-site"
      class="btn-link"
      >Saber mais</a
    >

    <a-scene
      mindar-image="imageTargetSrc: ./pauliteiros.mind; autoStart: true; uiScanning: no;"
      color-space="sRGB"
      renderer="colorManagement: true, physicallyCorrectLights"
      vr-mode-ui="enabled: false"
      device-orientation-permission-ui="enabled: false"
      raycaster="objects: .clickable"
      cursor="fuse: false; rayOrigin: mouse;"
    >
      <a-assets>
        <video
          id="vid"
          src="./Pauliteirosclip.mp4"
          playsinline
          webkit-playsinline
          muted
          crossorigin="anonymous"
          loop
          preload="auto"
        ></video>
      </a-assets>

      <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

      <a-entity mindar-image-target="targetIndex: 0">
        <a-video
          src="#vid"
          position="0 0.15 0"
          width="1"
          height="0.75"
        ></a-video>

        <a-text
          value="LHACCO L' CASTILHO"
          position="0 -0.32 0.02"
          align="center"
          color="#2C2218"
          width="1.2"
          font="https://cdn.aframe.io/fonts/Exo2Bold.fnt"
        >
        </a-text>

        <a-entity
          id="balao-capsula"
          class="clickable"
          position="0.9 0.15 0.1"
          rotation="0 -15 0"
        >
          <a-entity
            geometry="primitive: plane; width: 0.8; height: 0.7"
            material="shader: standard; color: #ffffff; transparent: true; opacity: 0.3; roughness: 0; metalness: 0.2;"
            position="0 0 0"
          ></a-entity>

          <a-text
            id="texto-scroll"
            value="Tap para ler sobre o Lhacco..."
            position="0 0 0.02"
            align="center"
            color="#1a1410"
            width="0.7"
            wrap-count="16"
          >
          </a-text>

          <a-circle
            color="#c4622d"
            radius="0.03"
            position="0.3 -0.25 0.03"
          ></a-circle>
        </a-entity>
      </a-entity>
    </a-scene>

    <script>
      const video = document.getElementById("vid");
      const btnVideo = document.getElementById("btn-video");
      const btnSite = document.getElementById("btn-site");
      const textoScroll = document.getElementById("texto-scroll");
      const balao = document.getElementById("balao-capsula");

      // Conteúdo dividido para o efeito de scroll/tap
      const paragrafos = [
        "Lhacco e o nome para a melodia, texto e coreografia dos Pauliteiros.",
        "O bailarino chama-se dancador e nao pauliteiro.",
        "Divide-se em 4 partes: Entrada, Anunciar, Lhacco e Bicha.",
        "Os Pauliteiros sao uma tradicao guerreira e ritual de Miranda do Douro.",
      ];
      let indiceTexto = 0;

      // Evento de Tap no Balão
      balao.addEventListener("click", () => {
        indiceTexto = (indiceTexto + 1) % paragrafos.length;
        textoScroll.setAttribute("value", paragrafos[indiceTexto]);

        // Pequena animação de escala ao clicar
        balao.setAttribute(
          "animation",
          "property: scale; to: 1.1 1.1 1.1; dur: 100; dir: alternate; loop: 2",
        );
      });

      document
        .querySelector("[mindar-image-target]")
        .addEventListener("targetFound", () => {
          video.play();
          btnVideo.style.display = "block";
          btnSite.style.display = "block";
        });

      document
        .querySelector("[mindar-image-target]")
        .addEventListener("targetLost", () => {
          video.pause();
          btnVideo.style.display = "none";
          btnSite.style.display = "none";
        });
    </script>
  </body>
</html>
